<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example</title>
    <style>
        body{
                background-color: grey;
            }
            h1{
                background-color: yellow;
                color: red;
            }
            div>p{
                background-color: powderblue;
                color: black;
            }
            
            div p{
                background-color: cyan;
                color: brown;
            }
            nesteddiv p{
                background-color: navy;
                color: pink;
            }
            p span{
                background-color: pink;
                color: darkblue;
            }
            firstp{
                background-color: tomato;
            }
            body>p{
                background-color: darkcyan;

            }
            nesteddiv p{
                background-color: lightyellow;
                color: purple;
            }
            body span{
                background-color: lightgray;

            }
    </style>
</head>
<body>
    <h1>h1 HEADER</h1>
    <p id="firstp">p outside div</p>
    <div>
        <p>p directly inside div</p>
        <span>
            <p>p inside span inside div</p>
        </span>
        <span>
            <p>p inside span inside div</p>
        </span>
        <p>p directly inside div</p>
        <div class="nesteddiv">
            <p>p inside nested div</p>
            <span>
                <p>p inside span insted nested div</p>
            </span>
            <span>
                <p>p inside span inside nested div</p>
             </span>
             <p>p inside nested div</p>
        </div>
        <p>p directly inside div</p>
    </div>
    <p>p outside div</p>
</body>
</html>
